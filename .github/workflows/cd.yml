name: CD

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - ".gitignore"
      - "LICENSE"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: "20"

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker images
        run: |
          docker compose -f docker-compose.yml build \
            --build-arg NODE_ENV=production

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker images
        run: |
          docker tag graphflow-backend:latest ${{ secrets.DOCKER_USERNAME }}/graphflow-backend:latest
          docker tag graphflow-frontend:latest ${{ secrets.DOCKER_USERNAME }}/graphflow-frontend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/graphflow-backend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/graphflow-frontend:latest

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/graphflow
            docker compose pull
            docker compose up -d --remove-orphans
            docker system prune -f
